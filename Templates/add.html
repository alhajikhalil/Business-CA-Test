<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Business — BizSpot</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
:root {
      --ink: #0f0e0c;
      --cream: #faf7f2;
      --accent: #d4522a;
      --accent2: #2a7d4f;
      --gold: #c9a84c;
      --muted: #7a7570;
      --border: #e8e2d9;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--ink);
      color: var(--cream);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 4px solid var(--accent);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -1px;
      padding: 1rem 0;
    }

    .logo span { color: var(--accent); }

    nav a {
      color: var(--cream);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-left: 2rem;
      opacity: 0.8;
    }
    nav a:hover { opacity: 1; }

    .page-hero {
      background: var(--ink);
      color: var(--cream);
      padding: 2.5rem 2rem;
    }

    .page-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 900;
    }

    .page-hero p {
      font-size: 0.9rem;
      opacity: 0.6;
      margin-top: 0.4rem;
    }

    .container {
      max-width: 700px;
      margin: 2.5rem auto;
      padding: 0 2rem;
    }

    .flash-zone { margin-bottom: 1.5rem; }

    .flash {
      padding: 0.8rem 1.2rem;
      border-left: 4px solid;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      border-radius: 2px;
    }

    .flash.error { background: #fdf0ec; border-color: var(--accent); color: var(--accent); }

    .form-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.4rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    label .required { color: var(--accent); margin-left: 2px; }

    input, textarea, select {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      background: var(--cream);
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      background: white;
    }

    textarea { resize: vertical; min-height: 100px; }

 .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }

     .submit-row {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-top: 2rem;
    }

    .btn-submit {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.85rem 2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover { background: #b8441f; }

    .btn-cancel {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .btn-cancel:hover { color: var(--ink); }
